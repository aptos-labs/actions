name: Setup docker
description: Sets up docker with buildx for use in other actions.

inputs:
  buildx_version:
    description: "The buildx version to use."
    default: v0.31.1

runs:
  using: composite
  steps:
    - name: setup docker context for buildx
      id: buildx-context
      shell: bash
      run: docker context create builders

    - name: setup docker buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # pin @v4.0.0
      with:
        endpoint: builders
        version: ${{ inputs.buildx_version }}
        
    - uses: imjasonh/setup-crane@6da1ae018866400525525ce74ff892880c099987 # pin@v0.5
      with:
        version: v0.15.2
